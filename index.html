<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ポケモン抽選</title>

<link rel="stylesheet" href="style.css">
</head>

<div class="sidebar-toggle" onclick="toggleSidebar()">📋 全リスト</div>

<div id="sidebar" class="sidebar hidden">
  <h3>ポケモン一覧</h3>
  <ul id="sidebarList"></ul>
</div>

<body>

<div class="title-box">
  Pokémon Champions<br>
  2026/06/17時点
</div>

<!-- ヘルプ -->
<div class="help-icon" onclick="toggleHelp()">？</div>

<div id="helpModal" class="modal hidden">
  <div class="modal-content">
    <h3>使い方</h3>
    <p>・スロットをスタート/ストップ</p>
    <p>・空欄クリック → 抽選結果を記録</p>
    <p>・ポケモン名クリック → 削除</p>
    <button onclick="toggleHelp()">×</button>
  </div>
</div>

<h1>ポケモン抽選</h1>

<div class="container">

  <!-- 左 -->
  <div class="left">

    <label><input type="radio" name="mode" value="all" checked> すべて</label>
    <label><input type="radio" name="mode" value="noMega"> メガなし</label>
    <label><input type="radio" name="mode" value="mega"> メガあり</label>
    <br><br>
    <label><input type="radio" name="excludeMode" value="off" checked> 重複あり</label>
    <label><input type="radio" name="excludeMode" value="on"> 重複なし</label>

    <div id="result">---</div>

    <button onclick="toggle()">スタート / ストップ</button>

  </div>

  <!-- 右 -->
  <div class="right">

    <table id="logTable">
      <thead>
        <tr>
          <th>①</th>
          <th>②</th>
          <th>③</th>
          <th>④</th>
          <th>⑤</th>
        </tr>
      </thead>

      <tbody>
        <tr><td></td><td></td><td></td><td></td><td></td></tr>
        <tr><td></td><td></td><td></td><td></td><td></td></tr>
        <tr><td></td><td></td><td></td><td></td><td></td></tr>
        <tr><td></td><td></td><td></td><td></td><td></td></tr>
        <tr><td></td><td></td><td></td><td></td><td></td></tr>
        <tr><td></td><td></td><td></td><td></td><td></td></tr>
      </tbody>
    </table>

    <div class="reset-area">
      <button onclick="resetTable()">リセット</button>
    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
