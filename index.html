<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ポケモン抽選</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="title-box">
  Pokémon Champions<br>
  2026/04/18時点
</div>

<!-- ヘルプ -->
<div class="help-icon" onclick="toggleHelp()">？</div>

<div id="helpModal" class="modal hidden">
  <div class="modal-content">
    <h3>使い方</h3>
    <p>・スロットをスタート/ストップ</p>
    <p>・番号クリック → 抽選結果を記録</p>
    <p>・ポケモン名クリック → 削除</p>
    <button onclick="toggleHelp()">×</button>
  </div>
</div>

<h1>ポケモン抽選</h1>

<div class="container">

  <!-- 左 -->
  <div class="left">

    <label><input type="radio" name="mode" value="all" checked> すべて</label>
    <label><input type="radio" name="mode" value="noMega"> メガなし</label>
    <label><input type="radio" name="mode" value="mega"> メガあり</label>
    <br><br>
    <label><input type="radio" name="excludeMode" value="off" checked> 重複あり</label>
    <label><input type="radio" name="excludeMode" value="on"> 重複なし</label>

    <div id="result">---</div>

    <button onclick="toggle()">スタート / ストップ</button>

  </div>

  <!-- 右 -->
  <div class="right">

    <table id="logTable">
      <thead>
        <tr>
          <th onclick="addToColumn(0)">①</th>
          <th onclick="addToColumn(1)">②</th>
          <th onclick="addToColumn(2)">③</th>
          <th onclick="addToColumn(3)">④</th>
        </tr>
      </thead>

      <tbody>
        <tr><td></td><td></td><td></td><td></td></tr>
        <tr><td></td><td></td><td></td><td></td></tr>
        <tr><td></td><td></td><td></td><td></td></tr>
        <tr><td></td><td></td><td></td><td></td></tr>
        <tr><td></td><td></td><td></td><td></td></tr>
        <tr><td></td><td></td><td></td><td></td></tr>
      </tbody>
    </table>

    <div class="reset-area">
      <button onclick="resetTable()">リセット</button>
    </div>

  </div>

</div>

<script>
let data = [];
let interval = null;

// CSV
fetch("pokemon.csv")
  .then(res => res.text())
  .then(text => {
    const lines = text.trim().split("\n");
    const headers = lines[0].split(",");

    data = lines.slice(1).map(line => {
      const values = line.split(",");
      let obj = {};

      headers.forEach((h, i) => obj[h.trim()] = values[i].trim());

      return {
        no: Number(obj.No),
        name: obj.name,
        mega: Number(obj.mega)
      };
    });
  });

// フィルター
function getFilteredList() {
  const mode = document.querySelector('input[name="mode"]:checked').value;

  if (mode === "mega") return data.filter(d => d.mega === 1);
  if (mode === "noMega") return data.filter(d => d.mega === 0);
  return data;
}

// スロット
function toggle() {
  const result = document.getElementById("result");

  if (interval === null) {
    interval = setInterval(() => {
      const list = getFilteredList();
      if (list.length === 0) return;

      const r = Math.floor(Math.random() * list.length);
      result.textContent = list[r].name;

    }, 50);

  } else {
    clearInterval(interval);
    interval = null;
  }
}

// 追加（回転中禁止）
function addToColumn(col) {
  if (interval !== null) return;

  const table = document.getElementById("logTable").getElementsByTagName("tbody")[0];
  const value = document.getElementById("result").textContent;

  if (!value || value === "---") return;

  for (let i = 0; i < table.rows.length; i++) {
    const cell = table.rows[i].cells[col];

    if (cell.textContent === "") {
      cell.textContent = value;

      cell.onclick = function () {
        cell.textContent = "";
      };

      return;
    }
  }
}

// 全消去
function resetTable() {
  const cells = document.querySelectorAll("#logTable td");

  cells.forEach(cell => {
    cell.textContent = "";
    cell.onclick = null;
  });
}

// ヘルプ
function toggleHelp() {
  document.getElementById("helpModal").classList.toggle("hidden");
}

function getTableValues() {
  const cells = document.querySelectorAll("#logTable td");
  const values = [];

  cells.forEach(cell => {
    if (cell.textContent !== "") {
      values.push(cell.textContent);
    }
  });

  return values;
}

function getFilteredList() {
  const mode = document.querySelector('input[name="mode"]:checked').value;
  const excludeMode = document.querySelector('input[name="excludeMode"]:checked').value;

  let list = [];

  if (mode === "mega") {
    list = data.filter(d => d.mega === 1);
  } else if (mode === "noMega") {
    list = data.filter(d => d.mega === 0);
  } else {
    list = data;
  }

  // ★追加：表にあるやつ除外
  if (excludeMode === "on") {
    const used = getTableValues();
    list = list.filter(d => !used.includes(d.name));
  }

  return list;
}

</script>

</body>
</html>
