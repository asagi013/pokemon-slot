<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ポケモン抽選</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>ポケモン抽選</h1>

<!-- フィルター -->
<label><input type="radio" name="mode" value="all" checked> 全候補</label>
<label><input type="radio" name="mode" value="noMega"> メガなし</label>
<label><input type="radio" name="mode" value="mega"> メガあり</label>

<!-- 結果 -->
<div id="result">---</div>

<button onclick="toggle()">スタート / ストップ</button>

<!-- 履歴 -->
<h2>履歴</h2>

<table id="logTable">
  <thead>
    <tr>
      <th onclick="addToColumn(0)">列1</th>
      <th onclick="addToColumn(1)">列2</th>
      <th onclick="addToColumn(2)">列3</th>
      <th onclick="addToColumn(3)">列4</th>
    </tr>
  </thead>

  <tbody>
    <tr><td></td><td></td><td></td><td></td></tr>
    <tr><td></td><td></td><td></td><td></td></tr>
    <tr><td></td><td></td><td></td><td></td></tr>
    <tr><td></td><td></td><td></td><td></td></tr>
    <tr><td></td><td></td><td></td><td></td></tr>
    <tr><td></td><td></td><td></td><td></td></tr>
  </tbody>
</table>

<script>
let data = [];
let interval = null;

// CSV読み込み（No列あり対応）
fetch("pokemon.csv")
  .then(res => res.text())
  .then(text => {
    const lines = text.trim().split("\n");
    const headers = lines[0].split(",");

    data = lines.slice(1).map(line => {
      const values = line.split(",");
      let obj = {};

      headers.forEach((h, i) => obj[h.trim()] = values[i].trim());

      return {
        no: Number(obj.No),
        name: obj.name,
        mega: Number(obj.mega)
      };
    });
  });

// フィルター処理
function getFilteredList() {
  const mode = document.querySelector('input[name="mode"]:checked').value;

  if (mode === "mega") return data.filter(d => d.mega === 1);
  if (mode === "noMega") return data.filter(d => d.mega === 0);
  return data;
}

// スロット開始/停止
function toggle() {
  const result = document.getElementById("result");

  if (interval === null) {
    interval = setInterval(() => {
      const list = getFilteredList();
      if (list.length === 0) return;

      const r = Math.floor(Math.random() * list.length);
      const picked = list[r];

      result.textContent = picked.name;

    }, 50);

  } else {
    clearInterval(interval);
    interval = null;
  }
}

// 履歴追加（6×4）
function addToColumn(col) {
  const table = document.getElementById("logTable").getElementsByTagName("tbody")[0];
  const value = document.getElementById("result").textContent;

  if (!value || value === "---") return;

  for (let i = 0; i < table.rows.length; i++) {
    const cell = table.rows[i].cells[col];
    if (cell.textContent === "") {
      cell.textContent = value;
      return;
    }
  }

  alert("この列はいっぱいです");
}
</script>

</body>
</html>
